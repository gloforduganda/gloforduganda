# ── nginx-proxy/local-mail.conf ──────────────────────────────
# Local development Nginx config for mail.gloford.org.
# Accessible at http://localhost:8025 (mapped in docker-compose.yml).
#
# In production on the VPS, replace this with the full TLS config
# from mail/nginx-mail.gloford.org.conf.
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name mail.gloford.org localhost;

    # ── Status / health check ────────────────────────────────
    location /health {
        access_log off;
        return 200 "mail proxy ok\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy to webmail UI on host port 8080 ────────────────
    # When you add Roundcube or Snappymail, it will run on 8080.
    # For now this returns a placeholder so Nginx starts cleanly.
    location / {
        # Uncomment when webmail container is running:
        # proxy_pass         http://host.docker.internal:8080;
        # proxy_http_version 1.1;
        # proxy_set_header   Host              $host;
        # proxy_set_header   X-Real-IP         $remote_addr;
        # proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # proxy_set_header   X-Forwarded-Proto $scheme;

        return 200 "Gloford mail proxy — webmail UI not yet configured.\n";
        add_header Content-Type text/plain;
    }
}
