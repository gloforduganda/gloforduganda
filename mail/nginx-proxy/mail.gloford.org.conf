# ── mail/nginx-proxy/mail.gloford.org.conf ───────────────────
# Production Nginx config for mail.gloford.org.
# Mounted into the nginx container via docker-compose.yml.
# ─────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS + serve ACME challenge for certbot
server {
    listen 80;
    listen [::]:80;
    server_name mail.gloford.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to webmail UI
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.gloford.org;

    # ── TLS (certbot managed) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mail.gloford.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.gloford.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── Proxy to webmail UI on port 8080 ─────────────────────
    # Uncomment when webmail (Roundcube/Snappymail) is running.
    # location / {
    #     proxy_pass         http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 60s;
    #     proxy_buffering    off;
    # }

    location / {
        return 200 "Gloford mail server — webmail UI coming soon.\n";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
}
